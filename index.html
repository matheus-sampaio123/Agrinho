<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agrinho - Projeto Interativo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="img/agrinho-logo.png" alt="Logo Agrinho" class="logo">
    <h1>Bem-vindo ao Projeto Agrinho</h1>
  </header>

  <main>
    <section class="mensagem">
      <p id="saudacao">Clique no botão para receber uma saudação!</p>
      <button id="btn-saudacao">Receber Saudação</button>
    </section>

    <section class="tema">
      <h2>Sobre o Agrinho</h2>
      <p>O Agrinho incentiva a educação, cidadania e sustentabilidade nas escolas.</p>
    </section>

    <section class="modo-escuro">
      <button id="btn-modo">Ativar Modo Escuro</button>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Projeto Agrinho</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
