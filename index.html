<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho: Sustentabilidade no Campo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Projeto Agrinho 2026</h1>
        <nav>
            <button id="theme-toggle">Alternar Modo Escuro</button>
        </nav>
    </header>

    <main>
        <section id="hero">
            <h2>Tecnologia a favor do Agricultor</h2>
            <p>O uso consciente de recursos garante o futuro da nossa terra.</p>
        </section>

        <section id="interativo">
            <h3>Calculadora de Economia de Água</h3>
            <div class="form-group">
                <label for="litros">Litros economizados por dia:</label>
                <input type="number" id="litros" placeholder="Ex: 50">
                <button onclick="calcularEconomia()">Calcular Semanal</button>
            </div>
            <p id="resultado">Insira um valor para ver o impacto!</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Desenvolvido para o Concurso Agrinho</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
