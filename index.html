<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bem-vindo ao Agrinho</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="assets/images/logo.png" alt="Logo Agrinho">
    </div>
    <nav>
      <ul>
        <li><a href="#sobre">Sobre</a></li>
        <li><a href="#contato">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="bemvindo">
      <h1>Bem-vindo ao Agrinho!</h1>
      <p>Informe seu nome para uma saudação personalizada:</p>
      <input type="text" id="nome" placeholder="Seu nome">
      <button id="saudarBtn">Saudar</button>
      <p id="saudacao"></p>
    </section>
    <section id="sobre">
      <h2>Sobre o Projeto</h2>
      <p>O Agrinho é um projeto que promove educação agrícola para crianças.</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Agrinho - Todos os direitos reservados.</p>
    <button id="modoEscuroBtn">Ativar Modo Escuro</button>
  </footer>

  <script src="script.js"></script>
</body>
</html>
