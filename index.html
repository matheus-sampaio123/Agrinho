<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Bem-vindo ao Agrinho</h1>
        <button id="darkModeToggle">Modo Escuro</button>
    </header>
    
    <main>
        <section>
            <h2>Sobre o Agrinho</h2>
            <p>O Agrinho é um projeto do governo que visa...</p>
            <img src="img/exemplo.jpg" alt="Imagem do Agrinho">
        </section>

        <section>
            <h2>Vídeo</h2>
            <video controls>
                <source src="img/video.mp4" type="video/mp4">
                Seu navegador não suporta o vídeo.
            </video>
        </section>

        <section>
            <h2>Formulário de Contato</h2>
            <form>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Agrinho. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
